<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #ffffff;
            --timer-color: #37352f;
            --accent-color: #eb5757;
            --button-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        /* Modos */
        .modes {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .mode-btn {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            border: none;
            background: none;
            color: #a0a0a0;
            padding: 5px;
            transition: 0.3s;
        }

        .mode-btn.active {
            color: var(--accent-color);
            font-weight: bold;
            border-bottom: 2px solid var(--accent-color);
        }

        /* Temporizador */
        .timer-display {
            font-size: 5rem;
            font-weight: 700;
            margin: 10px 0;
            letter-spacing: -4px;
            color: var(--timer-color); /* Color de los números separado */
        }

        /* Botones */
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            background: var(--button-bg);
            border: 1px solid #e0e0e0;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--timer-color);
            transition: all 0.2s ease;
        }

        .btn:hover {
            border-color: var(--accent-color);
            background: #f9f9f9;
        }

        .settings-toggle {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            color: #a0a0a0;
            transition: transform 0.3s;
        }

        .settings-toggle:hover {
            color: var(--accent-color);
            transform: rotate(45deg);
        }

        /* Panel de Configuración */
        #settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 1px solid #eee;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
            width: 220px;
        }

        .field { margin-bottom: 10px; }
        label { display: block; font-size: 0.7rem; color: #666; margin-bottom: 3px; }
        input, select { width: 100%; padding: 5px; border-radius: 4px; border: 1px solid #ddd; font-size: 0.8rem; }
        
        .save-btn {
            width: 100%;
            background: var(--timer-color);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="modes">
        <button class="mode-btn active" id="focusModeBtn" onclick="switchMode('focus')">Focus</button>
        <button class="mode-btn" id="relajoModeBtn" onclick="switchMode('relajo')">Relajo</button>
        <button class="mode-btn" id="descansoModeBtn" onclick="switchMode('descanso')">Descanso</button>
    </div>

    <div class="timer-display" id="display">25:00</div>
    
    <div class="controls">
        <button class="btn" onclick="startTimer()">Empezar</button>
        <button class="btn" onclick="pauseTimer()">Pausa</button>
        <button class="btn" onclick="resetTimer()">Reiniciar</button>
        <button class="settings-toggle" onclick="toggleSettings()">⚙️</button>
    </div>

    <div id="settings-panel">
        <div class="field"><label>Minutos Focus:</label><input type="number" id="focusIn" value="25"></div>
        <div class="field"><label>Minutos Relajo:</label><input type="number" id="relajoIn" value="5"></div>
        <div class="field"><label>Minutos Descanso:</label><input type="number" id="descansoIn" value="15"></div>
        <div class="field"><label>Color Números:</label><input type="color" id="numCol" value="#37352f"></div>
        <div class="field"><label>Color Interfaz (Acento):</label><input type="color" id="accCol" value="#eb5757"></div>
        <div class="field">
            <label>Sonido de Alarma:</label>
            <select id="soundSel">
                <option value="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">Sutil (Beep)</option>
                <option value="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg">Reloj Digital</option>
                <option value="https://actions.google.com/sounds/v1/office/light_switch_on.ogg">Click Zen</option>
            </select>
        </div>
        <button class="save-btn" onclick="saveSettings()">Guardar</button>
    </div>

    <audio id="alarmSound"></audio>

    <script>
        let times = {
            focus: localStorage.getItem('focus') || 25,
            relajo: localStorage.getItem('relajo') || 5,
            descanso: localStorage.getItem('descanso') || 15
        };
        let colors = {
            num: localStorage.getItem('numCol') || '#37352f',
            acc: localStorage.getItem('accCol') || '#eb5757'
        };
        let selectedSound = localStorage.getItem('sound') || "https://actions.google.com/sounds/v1/alarms/beep_short.ogg";
        
        let timeLeft = times.focus * 60;
        let timerId = null;
        let currentMode = 'focus';

        function init() {
            document.documentElement.style.setProperty('--timer-color', colors.num);
            document.documentElement.style.setProperty('--accent-color', colors.acc);
            document.getElementById('focusIn').value = times.focus;
            document.getElementById('relajoIn').value = times.relajo;
            document.getElementById('descansoIn').value = times.descanso;
            document.getElementById('numCol').value = colors.num;
            document.getElementById('accCol').value = colors.acc;
            document.getElementById('soundSel').value = selectedSound;
            updateDisplay();
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('display').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function startTimer() {
            if (timerId) return;
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    const alarm = document.getElementById('alarmSound');
                    alarm.src = selectedSound;
                    alarm.play();
                }
            }, 1000);
        }

        function pauseTimer() { clearInterval(timerId); timerId = null; }

        function resetTimer() {
            pauseTimer();
            timeLeft = times[currentMode] * 60;
            updateDisplay();
        }

        function switchMode(mode) {
            currentMode = mode;
            ['focus','relajo','descanso'].forEach(m => {
                document.getElementById(`${m}ModeBtn`).classList.toggle('active', m === mode);
            });
            resetTimer();
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            times.focus = document.getElementById('focusIn').value;
            times.relajo = document.getElementById('relajoIn').value;
            times.descanso = document.getElementById('descansoIn').value;
            colors.num = document.getElementById('numCol').value;
            colors.acc = document.getElementById('accCol').value;
            selectedSound = document.getElementById('soundSel').value;

            localStorage.setItem('focus', times.focus);
            localStorage.setItem('relajo', times.relajo);
            localStorage.setItem('descanso', times.descanso);
            localStorage.setItem('numCol', colors.num);
            localStorage.setItem('accCol', colors.acc);
            localStorage.setItem('sound', selectedSound);

            init();
            toggleSettings();
            resetTimer();
        }

        init();
    </script>
</body>
</html>
